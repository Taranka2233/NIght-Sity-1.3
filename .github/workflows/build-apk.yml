name: Verify and build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install locked dependencies
        run: npm ci

      - name: Verify source and dependencies
        run: |
          npm run verify
          npm test
          npm audit --audit-level=low

      - name: Test Firestore security rules
        run: npm run test:rules

      - name: Prepare Capacitor project
        run: |
          npm run android:sync
          python3 setup_icons.py
          python3 setup_calls.py
          cp google-services.json android/app/google-services.json
          chmod +x android/gradlew

      - name: Lint, test and build debug APK
        working-directory: android
        run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug

      - name: Check packaged application
        run: |
          test -s android/app/build/outputs/apk/debug/app-debug.apk
          unzip -p android/app/build/outputs/apk/debug/app-debug.apk assets/public/index.html | grep -q 'ВЕРСИЯ 2.077.204'
          unzip -p android/app/build/outputs/apk/debug/app-debug.apk assets/public/firebase-bundle.js | grep -q 'WEBVIEW_XHR_FAILED'

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: night-city-2.077.204-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
