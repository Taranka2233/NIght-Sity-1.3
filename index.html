              <sc-if value="{{ chIsPublic }}">
              <div style="margin-top:12px;border-top:1px solid #10302a;padding-top:6px">
                <span style="font-family:'Russo One',sans-serif;font-size:12px;color:#3aff8f;letter-spacing:1px">// ПУБЛИЧНЫЙ КАНАЛ</span>
                <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">ПУБЛИЧНЫЙ АДРЕС</span>
                <div style="display:flex;align-items:center;gap:6px;background:#12121a;border:1px solid #23232e;border-left:2px solid #3aff8f;padding:0 12px">
                  <span style="color:#3aff8f;font-family:'JetBrains Mono',monospace;font-size:14px">@</span>
                  <input value="{{ chPubAddr }}" oninput="{{ onPubAddr }}" placeholder="channelname" style="flex:1;background:none;border:none;outline:none;color:#e8e8ec;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 0">
                </div>
                <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:#4a4a55;margin-top:6px">По этому адресу канал находят и подписываются все.</div>
              </div>
              </sc-if>
              <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">ОПИСАНИЕ</span>
              <textarea oninput="{{ onMDesc }}" placeholder="о чём канал…" style="width:100%;box-sizing:border-box;background:#12121a;border:1px solid #23232e;border-left:2px solid #00f0ff;color:#e8e8ec;font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 12px;outline:none;resize:none;min-height:56px">{{ mDesc }}</textarea>
              <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">УВЕДОМЛЕНИЯ</span>
              <button onclick="{{ chToggleMute }}" style="width:100%;padding:11px 12px;background:#12121a;border:1px solid #23232e;color:#e8e8ec;font-family:'JetBrains Mono',monospace;font-size:11px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center"><span>режим</span><span style="color:var(--nc-accent)">{{ chMuteLabel }}</span></button>
              <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">ОБСУЖДЕНИЕ</span>
              <button onclick="{{ chToggleComments }}" style="width:100%;padding:11px 12px;background:#12121a;border:1px solid #23232e;color:#e8e8ec;font-family:'JetBrains Mono',monospace;font-size:11px;text-align:left;cursor:pointer;display:flex;justify-content:space-between;align-items:center"><span>комментарии под постами</span><span style="color:#00f0ff">{{ chCommentsLabel }}</span></button>
              <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">ИНВАЙТ</span>
              <button onclick="{{ gsOpenInvite }}" style="width:100%;padding:11px;background:transparent;border:1px dashed #00f0ff;color:#00f0ff;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer">ССЫЛКА-ПРИГЛАШЕНИЕ</button>
              <span style="display:block;font-family:'JetBrains Mono',monospace;font-size:10px;color:#6a6a76;letter-spacing:1px;margin:12px 0 5px">АДМИНЫ (могут публиковать)</span>
              <sc-if value="{{ chHasAdmins }}">
              <div style="border:1px solid #23232e;margin-bottom:8px">
                <sc-for list="{{ chAdmins }}" as="ca">
                  <div style="display:flex;gap:8px;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05)">
                    <span style="flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;color:#e8e8ec">{{ ca.label }}</span>
                    <span style="flex:none;padding:3px 7px;border:1px solid var(--nc-accent);color:var(--nc-accent);font-family:'JetBrains Mono',monospace;font-size:8px">АДМИН</span>
                    <span onclick="{{ ca.remove }}" style="flex:none;color:#ff003c;cursor:pointer;font-size:14px;padding:0 4px">✕</span>
                  </div>
                </sc-for>
              </div>
              </sc-if>
              <div style="max-height:130px;overflow-y:auto;border:1px solid #23232e">
                <sc-for list="{{ chCandidates }}" as="cc">

              <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#8a8a96;margin-bottom:20px;line-height:1.5">Иконка приложения на рабочем столе изменится. Лаунчер может на секунду мигнуть.</div>

                <button onclick="{{ confirmIconYes }}" style="flex:1;padding:12px;background:var(--nc-accent);border:1px solid var(--nc-accent);color:#0a0a0f;font-family:'Russo One',sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer">ДА</button>

<script type="text/x-dc" data-dc-script="" data-props="{&quot;$preview&quot;:{&quot;width&quot;:452,&quot;height&quot;:900}}">
/* ==================== НАЙТ-СИТИ НЕТ · БЭКЕНД (FIREBASE) ====================
   Вставь ключи из настроек своего Firebase-проекта в FIREBASE_CONFIG ниже.
   Пока apiKey/projectId пустые — приложение работает в локальном демо-режиме.
   Как только заполнишь — включается реальный обмен сообщениями между людьми.
   ========================================================================= */
const FIREBASE_CONFIG = (typeof window !== 'undefined' && window.FIREBASE_CONFIG) ? window.FIREBASE_CONFIG : {};
const FIREBASE_ENABLED = !!(FIREBASE_CONFIG.apiKey && FIREBASE_CONFIG.projectId);

const NC = (() => {
  let fb = null, app = null, auth = null, db = null, ready = null;

  async function load() {
    if (fb) return fb;
    if (!window.NCFirebaseModules) await import('./firebase-bundle.js');
    if (!window.NCFirebaseModules) throw new Error('Firebase bundle is unavailable');
    const { appMod, authMod, fsMod } = window.NCFirebaseModules;
    fb = { appMod, authMod, fsMod };
    return fb;
  }

  function init() {
    if (ready) return ready;
    ready = (async () => {
      const { appMod, authMod, fsMod } = await load();
      app = appMod.initializeApp(FIREBASE_CONFIG);
      auth = authMod.getAuth(app);
      db = fsMod.getFirestore(app);
      return true;
    })();
    return ready;
  }

  const handleFromEmail = (email) => {
    const raw = String(email || '').split('@')[0].toLowerCase().replace(/[^a-z0-9_.-]/g, '').replace(/^[_.-]+|[_.-]+$/g, '');
    return '@' + (raw.slice(0, 24) || 'user');
  };
  const normHandle = (h) => { h = String(h).trim().toLowerCase(); return h.startsWith('@') ? h : '@' + h; };
  const chatIdFor = (a, b) => [a, b].sort().join('__');

  async function signUp(email, pass, name) {
    await init();
    const { authMod, fsMod } = fb;
    const cred = await authMod.createUserWithEmailAndPassword(auth, email, pass);
    const uid = cred.user.uid;
    const baseHandle = handleFromEmail(email);
    const candidates = [baseHandle, (baseHandle.slice(0, 17) + '-' + uid.slice(0, 6)).slice(0, 25)];
    let profile = null;
    try {
      for (const handle of candidates) {
        const nm = String(name || handle.slice(1).toUpperCase()).trim().slice(0, 48);
        const next = { uid, handle, name: nm, nameLower: nm.toLowerCase(), status: '', createdAt: fsMod.serverTimestamp() };
        try {
          await fsMod.runTransaction(db, async (tx) => {
            const handleRef = fsMod.doc(db, 'handles', handle);
            const occupied = await tx.get(handleRef);
            if (occupied.exists()) throw new Error('HANDLE_TAKEN');
            tx.set(fsMod.doc(db, 'users', uid), next);
            tx.set(handleRef, { uid, createdAt: fsMod.serverTimestamp() });
          });
          profile = next;
          break;
        } catch (e) {
          if (!String(e && e.message || e).includes('HANDLE_TAKEN')) throw e;
        }
      }
      if (!profile) throw new Error('HANDLE_UNAVAILABLE');
      await authMod.sendEmailVerification(cred.user);
      await authMod.signOut(auth);
      return { profile, needsVerify: true };
    } catch (e) {
      try { await authMod.deleteUser(cred.user); } catch (_) {}
      throw e;
    }
  }

  async function signIn(email, pass) {
    await init();
    const { authMod } = fb;
    const cred = await authMod.signInWithEmailAndPassword(auth, email, pass);
    if (!cred.user.emailVerified) { try { await authMod.signOut(auth); } catch (e) {} const err = new Error('EMAIL_NOT_VERIFIED'); err.code = 'email-not-verified'; throw err; }
    return cred.user;
  }

  async function signOut() { if (!auth) return; await fb.authMod.signOut(auth); }

  function onAuthChange(cb) {
    init()
      .then(() => fb.authMod.onAuthStateChanged(auth, (user) => cb(user, null), (error) => cb(null, error)))
      .catch((error) => cb(null, error));
  }

  async function getProfile(uid) {
    await init();
    const s = await fb.fsMod.getDoc(fb.fsMod.doc(db, 'users', uid));
    return s.exists() ? s.data() : null;
  }

  async function ensureProfile(user) {
    await init();
    const { fsMod } = fb;
    const uid = user && user.uid;
    if (!uid) throw new Error('Missing authenticated user');
    const userRef = fsMod.doc(db, 'users', uid);
    const existing = await fsMod.getDoc(userRef);
    if (existing.exists()) return existing.data();
    const baseHandle = handleFromEmail(user.email || ('user-' + uid.slice(0, 6)));
    const candidates = [baseHandle, (baseHandle.slice(0, 17) + '-' + uid.slice(0, 6)).slice(0, 25)];
    for (const handle of candidates) {
      const name = handle.slice(1).toUpperCase().slice(0, 48);
      const profile = { uid, handle, name, nameLower: name.toLowerCase(), status: '', createdAt: fsMod.serverTimestamp() };
      try {
        await fsMod.runTransaction(db, async (tx) => {
          const handleRef = fsMod.doc(db, 'handles', handle);
          const occupied = await tx.get(handleRef);
          if (occupied.exists() && occupied.data().uid !== uid) throw new Error('HANDLE_TAKEN');
          tx.set(userRef, profile);
          if (!occupied.exists()) tx.set(handleRef, { uid, createdAt: fsMod.serverTimestamp() });
        });
        return profile;
      } catch (e) {
        if (!String(e && e.message || e).includes('HANDLE_TAKEN')) throw e;
      }
    }
    throw new Error('HANDLE_UNAVAILABLE');
  }

  async function saveProfile(uid, patch) {
    await init();
    if (patch && patch.name) patch = { ...patch, nameLower: String(patch.name).toLowerCase() };
    const allowed = new Set(['name', 'nameLower', 'status', 'avatar', 'pubKey', 'online', 'lastActive']);
    const clean = {};
    Object.keys(patch || {}).forEach((key) => { if (allowed.has(key)) clean[key] = patch[key]; });
    if (!Object.keys(clean).length) throw new Error('No public profile fields to save');
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'users', uid), clean, { merge: true });
  }

  async function removeLegacyPrivateFields(uid) {
    await init();
    const { fsMod } = fb;
    await fsMod.updateDoc(fsMod.doc(db, 'users', uid), {
      email: fsMod.deleteField(), phone: fsMod.deleteField(), fcmToken: fsMod.deleteField(),
    });
  }

  async function getPrivate(uid, document) {
    await init();
    const snap = await fb.fsMod.getDoc(fb.fsMod.doc(db, 'users', uid, 'private', document));
    return snap.exists() ? snap.data() : null;
  }

  async function savePrivate(uid, document, patch) {
    await init();
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'users', uid, 'private', document), patch, { merge: true });
  }

  async function getIdToken(forceRefresh = false) {
    await init();
    if (!auth || !auth.currentUser) throw new Error('Not authenticated');
    return auth.currentUser.getIdToken(forceRefresh);
  }

  async function resendVerification(email, pass) {
    await init();
    const { authMod } = fb;
    const cred = await authMod.signInWithEmailAndPassword(auth, email, pass);
    try { await authMod.sendEmailVerification(cred.user); } finally { try { await authMod.signOut(auth); } catch (e) {} }
    return true;
  }
  async function searchUsers(q) {
    await init();
    const { fsMod } = fb;
    q = String(q || '').trim(); if (!q) return [];
    const out = [], seen = {};
    const push = (u) => { if (u && u.uid && !seen[u.uid]) { seen[u.uid] = 1; out.push(u); } };
    try { const p = await findByHandle(q); if (p) push(p); } catch (e) {}
    const col = fsMod.collection(db, 'users');
    try {
      const hq = normHandle(q);
      const s1 = await fsMod.getDocs(fsMod.query(col, fsMod.orderBy('handle'), fsMod.startAt(hq), fsMod.endAt(hq + '\uf8ff'), fsMod.limit(15)));
      s1.forEach(d => push(d.data()));
    } catch (e) {}
    try {
      const nq = q.toLowerCase();
      const s2 = await fsMod.getDocs(fsMod.query(col, fsMod.orderBy('nameLower'), fsMod.startAt(nq), fsMod.endAt(nq + '\uf8ff'), fsMod.limit(15)));
      s2.forEach(d => push(d.data()));
    } catch (e) {}
    return out;
  }
  async function findByHandle(handle) {
    await init();
    const { fsMod } = fb;
    const h = await fsMod.getDoc(fsMod.doc(db, 'handles', normHandle(handle)));
    if (!h.exists()) return null;
    return getProfile(h.data().uid);
  }

  async function addContact(myUid, other) {
    await init();
    const { fsMod } = fb;
    await fsMod.setDoc(
      fsMod.doc(db, 'users', myUid, 'contacts', other.uid),
      { uid: other.uid, handle: other.handle, name: other.name || other.handle, addedAt: fsMod.serverTimestamp() },
      { merge: true }
    );
  }

  function watchContacts(myUid, cb) {
    let unsub = () => {};
    init().then(() => {
      const { fsMod } = fb;
      unsub = fsMod.onSnapshot(fsMod.collection(db, 'users', myUid, 'contacts'),
        (snap) => cb(snap.docs.map(d => d.data())));
    }).catch(() => {});
    return () => unsub();
  }

  function watchChats(myUid, cb) {
    let unsubs = [];
    init().then(() => {
      const { fsMod } = fb;
      const buckets = { member: new Map(), pending: new Map() };
      const emit = () => cb([...new Map([...buckets.pending, ...buckets.member]).values()]);
      const listen = (key, field) => {
        const q = fsMod.query(fsMod.collection(db, 'chats'), fsMod.where(field, 'array-contains', myUid));
        unsubs.push(fsMod.onSnapshot(q, (snap) => {
          buckets[key] = new Map(snap.docs.map(d => [d.id, { id: d.id, ...d.data() }]));
          emit();
        }, () => {}));
      };
      listen('member', 'members');
      listen('pending', 'pending');
    }).catch(() => {});
    return () => unsubs.forEach(unsub => { try { unsub(); } catch (e) {} });
  }

  async function ensureDirectChat(chatId, members) {
    await init();
    const cleanMembers = [...new Set((members || []).filter(Boolean))];
    if (cleanMembers.length !== 2) throw new Error('Direct chat requires two members');
    const ref = fb.fsMod.doc(db, 'chats', chatId);
    const snap = await fb.fsMod.getDoc(ref);
    if (!snap.exists()) {
      await fb.fsMod.setDoc(ref, { members: cleanMembers, createdBy: auth.currentUser.uid, updatedAt: fb.fsMod.serverTimestamp(), lastText: '', lastFrom: '' });
    }
  }

  function _unreadInc(members, fromUid) {
    const u = {}; (members || []).forEach(m => { if (m !== fromUid) u[m] = fb.fsMod.increment(1); }); return u;
  }
  async function sendText(chatId, members, fromUid, text) {
    await init();
    const { fsMod } = fb;
    if ((members || []).length === 2) await ensureDirectChat(chatId, members);
    await fsMod.setDoc(fsMod.doc(db, 'chats', chatId),
      { members, updatedAt: fsMod.serverTimestamp(), lastText: text, lastFrom: fromUid, unread: _unreadInc(members, fromUid) }, { merge: true });
    await fsMod.addDoc(fsMod.collection(db, 'chats', chatId, 'messages'),
      { from: fromUid, type: 'text', text, ts: fsMod.serverTimestamp() });
  }
  async function sendMessage(chatId, members, fromUid, payload) {
    await init();
    const { fsMod } = fb;
    if ((members || []).length === 2) await ensureDirectChat(chatId, members);
    const t = payload.type || 'text';
    const preview = payload.text || (t === 'image' ? '🖼 Фото' : t === 'voice' ? '🎤 Голосовое' : t === 'sticker' ? 'Стикер' : t === 'file' ? ('📎 ' + (payload.fileName || 'файл')) : t === 'video' ? '🎬 Видео' : '');
    await fsMod.setDoc(fsMod.doc(db, 'chats', chatId),
      { members, updatedAt: fsMod.serverTimestamp(), lastText: preview, lastFrom: fromUid, unread: _unreadInc(members, fromUid) }, { merge: true });
    const doc = { from: fromUid, type: t, ts: fsMod.serverTimestamp() };
    [
      'text', 'imgSrc', 'audioSrc', 'vidSrc', 'stickerSrc', 'fileData', 'fileName', 'duration', 'caption',
      'ice', 'iceData', 'ghost', 'ghostSec', 'ghostAt', 'replyTo', 'replyText', 'replyFrom', 'fwdFrom',
      'e2e', 'encText', 'encIv', 'gkeys',
      'enc_imgSrc', 'enc_imgSrc_iv', 'enc_audioSrc', 'enc_audioSrc_iv', 'enc_vidSrc', 'enc_vidSrc_iv',
      'enc_fileData', 'enc_fileData_iv', 'enc_fileName', 'enc_fileName_iv', 'enc_caption', 'enc_caption_iv',
      'enc_replyText', 'enc_replyText_iv', 'enc_replyFrom', 'enc_replyFrom_iv', 'enc_fwdFrom', 'enc_fwdFrom_iv',
      'enc_iceData', 'enc_iceData_iv', 'enc_stickerSrc', 'enc_stickerSrc_iv'
    ].forEach(k => { if (payload[k] != null) doc[k] = payload[k]; });
    const ref = await fsMod.addDoc(fsMod.collection(db, 'chats', chatId, 'messages'), doc);
    return ref.id;
  }
  async function setReaction(chatId, msgId, key, uid, add) {
    await init();
    const { fsMod } = fb;
    const ref = fsMod.doc(db, 'chats', chatId, 'messages', msgId);
    await fsMod.updateDoc(ref, { ['reactions.' + key]: add ? fsMod.arrayUnion(uid) : fsMod.arrayRemove(uid) });
  }
  async function editMessage(chatId, msgId, patch) {
    await init();
    const { fsMod } = fb;
    const allowed = new Set(['text', 'encText', 'encIv', 'gkeys']);
    const clean = { edited: true };
    Object.keys(patch || {}).forEach((key) => { if (allowed.has(key)) clean[key] = patch[key]; });
    await fsMod.updateDoc(fsMod.doc(db, 'chats', chatId, 'messages', msgId), clean);
  }
  async function deleteMessage(chatId, msgId) {
    await init();
    const { fsMod } = fb;
    await fsMod.deleteDoc(fsMod.doc(db, 'chats', chatId, 'messages', msgId));
  }
  async function resetPassword(email) {
    await init();
    const { authMod } = fb;
    await authMod.sendPasswordResetEmail(auth, email);
  }
  async function heartbeat(uid) {
    await init();
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'users', uid), { lastActive: Date.now(), online: true }, { merge: true });
  }
  async function goOffline(uid) {
    await init();
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'users', uid), { lastActive: Date.now(), online: false }, { merge: true });
  }
  async function setTyping(chatId, uid, on) {
    await init();
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'chats', chatId), { typing: { [uid]: on ? Date.now() : 0 } }, { merge: true });
  }
  async function markRead(chatId, uid) {
    await init();
    await fb.fsMod.setDoc(fb.fsMod.doc(db, 'chats', chatId), { read: { [uid]: Date.now() }, unread: { [uid]: 0 } }, { merge: true });
  }
  function watchChatMeta(chatId, cb) {
    let unsub = () => {};
    init().then(() => { unsub = fb.fsMod.onSnapshot(fb.fsMod.doc(db, 'chats', chatId), (snap) => { if (snap.exists()) cb(snap.data()); }); }).catch(() => {});
    return () => unsub();
  }
  function watchProfile(uid, cb) {
    let unsub = () => {};
    init().then(() => { unsub = fb.fsMod.onSnapshot(fb.fsMod.doc(db, 'users', uid), (snap) => { if (snap.exists()) cb(snap.data()); }); }).catch(() => {});
    return () => unsub();
  }
  async function createGroup(name, memberUids, meta) {
    await init();
    const { fsMod } = fb;
    const ref = fsMod.doc(fsMod.collection(db, 'chats'));
    const invited = [...new Set((memberUids || []).filter(uid => uid && uid !== meta.owner))];
    const memberNames = { [meta.owner]: (meta.memberNames && meta.memberNames[meta.owner]) || 'Я' };
    const pendingNames = {};
    invited.forEach(uid => { if (meta.memberNames && meta.memberNames[uid]) pendingNames[uid] = meta.memberNames[uid]; });
    const data = { members: [meta.owner], pending: meta.isChannel ? [] : invited, name: name, owner: meta.owner, gtype: meta.gtype || 'public', avatar: meta.avatar || '', memberNames, pendingNames, admins: meta.admins || [meta.owner], updatedAt: fsMod.serverTimestamp(), lastText: (meta.isChannel ? 'канал создан' : 'банда собрана'), lastFrom: meta.owner };
    if (meta.isChannel) data.isChannel = true; else data.isGroup = true;
    await fsMod.setDoc(ref, data);
    return ref.id;
  }
  async function acceptGroupInvite(chatId, uid, name) {
    await init();
    const { fsMod } = fb;
    await fsMod.updateDoc(fsMod.doc(db, 'chats', chatId), {
      members: fsMod.arrayUnion(uid), pending: fsMod.arrayRemove(uid),
      ['memberNames.' + uid]: String(name || 'Участник').slice(0, 48),
      ['pendingNames.' + uid]: fsMod.deleteField(),
    });
  }
  async function declineGroupInvite(chatId, uid) {
    await init();
    const { fsMod } = fb;
    await fsMod.updateDoc(fsMod.doc(db, 'chats', chatId), {
      pending: fsMod.arrayRemove(uid), ['pendingNames.' + uid]: fsMod.deleteField(),
    });
  }
  async function inviteGroupMembers(chatId, uids, names) {
    await init();
    const { fsMod } = fb;
    const cleanUids = [...new Set((uids || []).filter(Boolean))];
    if (!cleanUids.length) return;
